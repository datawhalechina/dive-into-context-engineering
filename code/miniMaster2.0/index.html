<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网页</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background-color: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        h1 {
            color: #333;
            border-bottom: 2px solid #4CAF50;
            padding-bottom: 10px;
        }
        p {
            color: #666;
        }
        .highlight {
            background-color: #e7f3fe;
            padding: 10px;
            border-left: 4px solid #2196F3;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>欢迎来到我的网页</h1>
        <p>这是一个使用HTML和CSS创建的简单网页示例。</p>
        
        <div class="highlight">
            <p>这个网页包含以下特性：</p>
            <ul>
                <li>响应式设计</li>
                <li>现代CSS样式</li>
                <li>语义化HTML结构</li>
                <li>中文语言支持</li>
            </ul>
        </div>
        
        <h2>关于这个网页</h2>
        <p>这个网页是使用基本的HTML和CSS创建的。您可以根据需要修改内容、样式和结构。</p>
        
        <h2>下一步</h2>
        <p>您可以：</p>
        <ol>
            <li>添加更多内容</li>
            <li>修改CSS样式</li>
            <li>添加JavaScript交互功能</li>
            <li>部署到Web服务器</li>
        </ol>
        
        <p style="text-align: center; margin-top: 30px; color: #888; font-size: 0.9em;">
            创建时间: 2024年4月
        </p>
    </div>
</body>
</html>
